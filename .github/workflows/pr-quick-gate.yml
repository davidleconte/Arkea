name: PR Quick Gate

on:
  pull_request:
    paths:
      - "scripts/**"
      - "lib/**"
      - "docs/**"
      - "tests/**"
      - "Makefile"
      - ".poc-config.sh"
      - "pytest.ini"

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanitize environment
        run: make stop-all

      - name: Active documentation/runtime guardrails
        run: |
          make check-ports
          make audit-active

      - name: Active-scope consistency
        run: make check-consistency-active

      - name: Unified core tests (unit + runtime policy, optional local stack)
        run: make test-all
