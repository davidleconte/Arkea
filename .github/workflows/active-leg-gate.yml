name: Active Leg Gate (Podman)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  active-leg-gate:
    name: Active Path Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ARKEA_LEG: podman
      ARKEA_STRICT_RUNTIME_POLICY: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Podman + podman-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          pip install podman-compose

      - name: Verify active leg config
        run: |
          make check-env ARKEA_LEG=podman

      - name: Pre-pull Podman profile images
        run: |
          podman --version
          podman-compose -f podman-compose.yml --profile full pull || true

      - name: Bootstrap active runtime stack
        run: |
          make podman-up ARKEA_LEG=podman
          make status ARKEA_LEG=podman

      - name: Run quality gate (strict runtime policy + exclusivity)
        run: |
          make check ARKEA_LEG=podman
          make audit-active ARKEA_LEG=podman
          make test-runtime-policy-strict ARKEA_LEG=podman
          make test-leg-exclusivity ARKEA_LEG=podman

      - name: Podman profile smoke check (hcd-only)
        run: |
          podman-compose -f podman-compose.yml --profile hcd-only config --services
