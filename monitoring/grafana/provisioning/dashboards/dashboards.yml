# Grafana Dashboard Provisioning for ARKEA POC

apiVersion: 1

providers:
  - name: 'ARKEA Dashboards'
    orgId: 1
    folder: 'ARKEA'
    folderUid: 'arkea'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
