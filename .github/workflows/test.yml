name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write

jobs:
  # =============================================================================
  # Tests de Syntaxe et Validation
  # =============================================================================
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Check Shell Scripts Syntax
        run: |
          find scripts/ -name "*.sh" -type f | while read -r script; do
            echo "Checking: $script"
            bash -n "$script" || exit 1
          done

      - name: Check Python Scripts Syntax
        run: |
          find . -name "*.py" -type f -not -path "./.git/*" -not -path "./binaire/*" | while read -r script; do
            echo "Checking: $script"
            python3 -m py_compile "$script" || exit 1
          done

  # =============================================================================
  # Tests de Configuration
  # =============================================================================
  config-check:
    name: Configuration Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check .poc-config.sh
        run: |
          if [ -f .poc-config.sh ]; then
            bash -n .poc-config.sh || exit 1
            echo "✅ .poc-config.sh syntax OK"
          else
            echo "❌ .poc-config.sh missing"
            exit 1
          fi

      - name: Check .poc-profile
        run: |
          if [ -f .poc-profile ]; then
            bash -n .poc-profile || exit 1
            echo "✅ .poc-profile syntax OK"
          else
            echo "❌ .poc-profile missing"
            exit 1
          fi

      - name: Check .gitignore
        run: |
          if [ -f .gitignore ]; then
            echo "✅ .gitignore present"
          else
            echo "❌ .gitignore missing"
            exit 1
          fi

  # =============================================================================
  # Tests de Documentation
  # =============================================================================
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check README.md
        run: |
          if [ -f README.md ]; then
            echo "✅ README.md present"
          else
            echo "❌ README.md missing"
            exit 1
          fi

      - name: Check Markdown Links
        run: |
          # Vérifier que les liens dans la documentation sont valides
          find docs/ -name "*.md" -type f | while read -r doc; do
            echo "Checking links in: $doc"
            # Note: Installation de markdown-link-check si nécessaire
          done

  # =============================================================================
  # Tests de Structure
  # =============================================================================
  structure-check:
    name: Structure Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Required Directories
        run: |
          required_dirs=("scripts" "docs" "schemas")
          for dir in "${required_dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo "✅ $dir/ present"
            else
              echo "❌ $dir/ missing"
              exit 1
            fi
          done

      - name: Check Scripts Organization
        run: |
          if [ -d "scripts/setup" ] && [ -d "scripts/utils" ]; then
            echo "✅ Scripts organized correctly"
          else
            echo "❌ Scripts not organized correctly"
            exit 1
          fi

  # =============================================================================
  # Python Tests with Coverage
  # =============================================================================
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Python tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=0

      - name: Run Shell Script tests
        run: |
          echo "🧪 Running shell script tests..."
          # Make scripts executable
          chmod +x scripts/setup/00_onboarding.sh 2>/dev/null || true
          chmod +x tests/utils/kcov_runner.sh 2>/dev/null || true
          chmod +x scripts/utils/80_verify_all.sh 2>/dev/null || true
          chmod +x scripts/utils/95_cleanup.sh 2>/dev/null || true
          chmod +x scripts/utils/91_check_consistency.sh 2>/dev/null || true

          # Run pytest for shell scripts
          pytest tests/unit/test_shell_scripts.py -v -m "not integration"

          # Test dry-run flags directly
          echo ""
          echo "Testing --dry-run flags..."
          ./scripts/setup/00_onboarding.sh --dry-run
          ./tests/utils/kcov_runner.sh --dry-run
          ./scripts/utils/80_verify_all.sh --dry-run
          ./scripts/utils/95_cleanup.sh --dry-run

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: arkea-poc-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary
        run: |
          echo "📊 Coverage report uploaded to Codecov"
          echo "View at: https://codecov.io/gh/davidleconte/Arkea"
