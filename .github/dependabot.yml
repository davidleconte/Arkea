# =============================================================================
# ARKEA POC - Dependabot Configuration
# =============================================================================
# Date : 2026-03-13
# Version : 1.0.0
# Description : Automated dependency updates
# =============================================================================

version: 2

registries:
  # No private registries needed for this project

updates:
  # =============================================================================
  # Python Dependencies
  # =============================================================================
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    reviewers:
      - "davidleconte"
    assignees:
      - "davidleconte"
    target-branch: "develop"
    ignore:
      # Ignore major version updates for stable packages
      - dependency-name: "pyspark"
        update-types: ["version-update:semver-major"]
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]

  # =============================================================================
  # GitHub Actions
  # =============================================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "davidleconte"
    target-branch: "develop"

  # =============================================================================
  # Docker/Podman (if Dockerfiles exist)
  # =============================================================================
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "davidleconte"
    target-branch: "develop"
