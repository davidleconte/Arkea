# =============================================================================
# ARKEA POC - Podman Compose Configuration
# =============================================================================
# Date : 2026-03-13
# Version : 1.0.0
# Author : David LECONTE (IBM WW|Tiger Team - Watsonx.Data GPS)
#
# ⚠️ IMPERATIVE: Read PODMAN_RULES.md before modifying this file
# - Use podman-compose (NOT docker-compose)
# - Port range 9100-9199 for ARKEA (avoid conflicts)
# - All resources labeled with project=arkea
# =============================================================================

x-arkea-labels: &arkea-labels
  - "project=arkea"

x-arkea-common: &arkea-common
  restart: unless-stopped
  labels: *arkea-labels

services:
  # ===========================================================================
  # HCD (Hyper-Converged Database) - Cassandra 5.0
  # ===========================================================================
  hcd:
    <<: *arkea-common
    image: cassandra:5.0
    container_name: arkea-hcd
    hostname: arkea-hcd
    profiles:
      - full
      - hcd-only
    environment:
      CASSANDRA_CLUSTER_NAME: ARKEA-POC
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: SimpleSnitch
      MAX_HEAP_SIZE: 4G
      HEAP_NEWSIZE: 800M
    ports:
      # IMPERATIVE: Use non-default ports to avoid conflicts
      - "${HCD_CQL_PORT:-9102}:9042"      # CQL Native Transport
      - "${HCD_INTRA_NODE:-9100}:7000"    # Intra-node
      - "${HCD_INTRA_NODE_TLS:-9101}:7001" # Intra-node TLS
    volumes:
      - arkea-hcd-data:/var/lib/cassandra
    networks:
      - arkea-network
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' localhost 9042 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 6G
        reservations:
          cpus: '1'
          memory: 2G

  # ===========================================================================
  # Apache Spark 3.5.1
  # ===========================================================================
  spark-master:
    <<: *arkea-common
    image: apache/spark:3.5.1
    container_name: arkea-spark-master
    hostname: arkea-spark-master
    profiles:
      - full
      - spark-only
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "${SPARK_MASTER_PORT:-9277}:7077"  # Spark Master
      - "${SPARK_UI_PORT:-9280}:8080"      # Web UI
    volumes:
      - arkea-spark-data:/opt/spark/work
      - ./schemas:/opt/spark/schemas:ro
      - ./poc-design:/opt/spark/poc-design:ro
    networks:
      - arkea-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  spark-worker:
    <<: *arkea-common
    image: apache/spark:3.5.1
    container_name: arkea-spark-worker
    hostname: arkea-spark-worker
    profiles:
      - full
      - spark-only
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://arkea-spark-master:7077
    ports:
      - "${SPARK_WORKER_UI:-9281}:8081"   # Worker Web UI
    volumes:
      - arkea-spark-data:/opt/spark/work
    networks:
      - arkea-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G

  # ===========================================================================
  # Apache Kafka 3.7.1 (KRaft mode - no Zookeeper)
  # ===========================================================================
  kafka:
    <<: *arkea-common
    image: apache/kafka:3.7.1
    container_name: arkea-kafka
    hostname: arkea-kafka
    profiles:
      - full
      - kafka-only
    environment:
      # KRaft mode configuration for apache/kafka image
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@arkea-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://arkea-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      # Log directories for KRaft
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "${KAFKA_PORT:-9192}:9092"        # Broker
      - "${KAFKA_CONTROLLER:-9193}:9093"  # Controller
    volumes:
      - arkea-kafka-data:/var/lib/kafka/data
    networks:
      - arkea-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # ===========================================================================
  # Kafka UI (Optional - for management)
  # ===========================================================================
  kafka-ui:
    <<: *arkea-common
    image: provectuslabs/kafka-ui:latest
    container_name: arkea-kafka-ui
    hostname: arkea-kafka-ui
    profiles:
      - full
      - kafka-only
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=ARKEA-POC
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=arkea-kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-9190}:8080"
    networks:
      - arkea-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

# =============================================================================
# Networks
# =============================================================================
networks:
  arkea-network:
    name: arkea-network
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.89.10.0/24
          gateway: 10.89.10.1
    labels: *arkea-labels

# =============================================================================
# Volumes
# =============================================================================
volumes:
  arkea-hcd-data:
    name: arkea-hcd-data
    labels: *arkea-labels
  arkea-hcd-logs:
    name: arkea-hcd-logs
    labels: *arkea-labels
  arkea-spark-data:
    name: arkea-spark-data
    labels: *arkea-labels
  arkea-kafka-data:
    name: arkea-kafka-data
    labels: *arkea-labels
