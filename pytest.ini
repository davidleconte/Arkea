[pytest]
# =============================================================================
# ARKEA POC - Pytest Configuration
# =============================================================================
# Date : 2026-03-13
# Version : 1.0.0
# =============================================================================

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --ignore=binaire
    --ignore=software
    --ignore=inputs-client
    --ignore=inputs-ibm
    --cov=.
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=0

# Markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require HCD/Kafka)
    runtime_policy: Runtime policy tests (dual-leg exclusivity and host port mapping)
    e2e: End-to-end tests (full pipeline)
    slow: Slow tests (skip with -m 'not slow')

# Discovery hygiene
norecursedirs =
    binaire
    software
    poc-design/bic
    poc-design/domirama2

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum version
minversion = 7.0
